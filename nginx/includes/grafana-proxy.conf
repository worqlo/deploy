# =============================================================================
# Grafana reverse proxy
# =============================================================================
# Included by: nginx.conf, nginx-ssl.conf (both HTTP and HTTPS server blocks)
#
# Uses variable-based proxy_pass so nginx resolves the hostname at runtime
# via the Docker DNS resolver (127.0.0.11). Nginx starts successfully even
# when Grafana is not running — requests to /grafana/ return 502.
#
# Requires in parent http {} block:
#   - map $http_x_forwarded_proto $redirect_scheme { ... }
# =============================================================================

# Redirect /grafana to /grafana/
location = /grafana {
    return 301 $redirect_scheme://$host/grafana/;
}

# Grafana UI (serve_from_sub_path=false; nginx strips /grafana prefix)
location /grafana/ {
    set $grafana_backend http://grafana:3000;
    rewrite ^/grafana/(.*) /$1 break;
    proxy_pass $grafana_backend;
    include /etc/nginx/includes/proxy-params.conf;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
