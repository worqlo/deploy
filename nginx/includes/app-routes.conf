# =============================================================================
# Full application routes (auth, API, health, WebSocket, Chat UI)
# =============================================================================
# Included by:
#   - nginx-ssl.conf  → HTTPS server block (port 443)
#   - nginx.conf      → HTTP-only server block (port 80, non-SSL deployments)
#
# Contains location = / and location / catch-all blocks.
# For the HTTP server in nginx-ssl.conf (behind SSL proxy), use
# app-routes-api.conf instead — it omits catch-all blocks so the
# parent can handle HTTP→HTTPS redirect logic inline.
#
# Requires in parent http {} block:
#   - upstream api_backend, upstream chat_ui
#   - map $http_x_forwarded_proto $redirect_scheme { ... }
# =============================================================================

error_page 413 = @error_413_json;
location @error_413_json {
    default_type application/json;
    return 413 '{"detail":"File too large. Maximum upload size is 50 MB. If you are behind a reverse proxy, ensure its client_max_body_size is at least 50M.","type":"upload_error","code":413}';
}

# --- Backend auth (specific FastAPI routes only) ---
location ~ ^/api/auth/(login|forgot-password|reset-password|validate-token|refresh-token|current-user|verify)$ {
    proxy_pass http://api_backend/api/auth/$1$is_args$args;
    proxy_redirect http:// $redirect_scheme://;
    include /etc/nginx/includes/proxy-params.conf;
}

# --- Chat-UI auth (NextAuth + custom routes) ---
location /api/auth/ {
    proxy_pass http://chat_ui/api/auth/;
    include /etc/nginx/includes/proxy-params.conf;
}

# --- Chat-UI OAuth (exchange-token, disconnect) ---
location /api/oauth/ {
    proxy_pass http://chat_ui/api/oauth/;
    include /etc/nginx/includes/proxy-params.conf;
}

# --- Backend API ---
location /api/ {
    client_max_body_size 50M;
    limit_req zone=api_limit burst=50 nodelay;
    limit_conn conn_limit 20;

    proxy_pass http://api_backend;
    proxy_redirect http:// $redirect_scheme://;
    include /etc/nginx/includes/proxy-params.conf;
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
}

# --- Health check ---
location /health {
    proxy_pass http://api_backend/health;
    proxy_redirect http:// $redirect_scheme://;
    include /etc/nginx/includes/proxy-params.conf;
}

# --- Metrics (internal only) ---
location /metrics {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    proxy_pass http://api_backend/metrics;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}

# --- WebSocket ---
location /ws {
    proxy_pass http://api_backend/ws;
    proxy_redirect http:// $redirect_scheme://;
    include /etc/nginx/includes/proxy-params.conf;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_connect_timeout 7d;
    proxy_send_timeout 7d;
    proxy_read_timeout 7d;
}

# --- Root: backend decides tenant-redirect vs chat-ui ---
location = / {
    proxy_pass http://api_backend/;
    proxy_redirect http:// $redirect_scheme://;
    include /etc/nginx/includes/proxy-params.conf;
}

# --- Chat UI (frontend catch-all) ---
location / {
    proxy_pass http://chat_ui;
    include /etc/nginx/includes/proxy-params.conf;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
